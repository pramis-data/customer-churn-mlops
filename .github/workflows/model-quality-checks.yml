name: Model quality checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit and evidence tests
        run: |
          mkdir -p test-results
          pytest -q --junitxml=test-results/pytest-results.xml

      - name: Run repository evidence validation
        run: |
          python scripts/validate_evidence.py

      - name: Upload quality evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-quality-evidence
          path: |
            test-results/pytest-results.xml
            evidence/ci_summary.json
          if-no-files-found: warn
          retention-days: 30
